<!DOCTYPE html>
<html>

<head>
  <title>Agriculture Management System</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-image: url('agricultural.jpeg');
      background-size: cover;
      color: rgb(6, 5, 5);
    }

    h1 {
      margin: 0;
      padding: 20px 0;
      font-size: 50px;
      font-weight: bold;
      text-shadow: 2px 2px 4px black;
    }

    h2 {
      margin: 0;
      padding: 10px 0;
      font-size: 30px;
      font-weight: bold;
      text-shadow: 2px 2px 4px black;
    }

    form {
      display: inline-block;
      border: 1px solid rgb(11, 10, 10);
      border-radius: 5px;
      padding: 20px;
      text-align: left;
      background-color: rgba(220, 123, 99, 0.8);
      box-shadow: 2px 2px 4px rgb(240, 156, 156);
    }

    label {
      display: block;
      margin-bottom: 10px;
      font-size: 20px;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgb(152, 97, 97);
    }

    input[type="text"],
    input[type="password"],
    input[type="number"],
    input[type="date"] {
      width: 100%;
      padding: 12px 20px;
    }
  </style>
</head>

<body>
  <h1>Agriculture Management System</h1>

  <h2>Farm Information</h2>
  <form>
    <label for="farm-name">Farm Name:</label><br>
    <input type="text" id="farm-name" name="farm-name"><br>
    <label for="location">Location:</label><br>
    <input type="text" id="location" name="location"><br>
    <label for="acreage">Acreage:</label><br>
    <input type="number" id="acreage" name="acreage"><br><br>
    <input type="submit" value="Submit">
  </form>

  <h2>Crop Information</h2>
  <form>
    <label for="crop-name">Crop Name:</label><br>
    <input type="text" id="crop-name" name="crop-name"><br>
    <label for="planting-date">Planting Date:</label><br>
    <input type="date" id="planting-date" name="planting-date"><br>
    <label for="expected-yield">Expected Yield (kg):</label><br>
    <input type="number" id="expected-yield" name="expected-yield"><br><br>
    <input type="submit" value="Submit">
  </form>
</body>

</html>
